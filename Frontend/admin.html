<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Admin | Aetheris</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <main class="dashboard">
            <aside class="sidebar">
                <h1 class="logo">Aetheris Admin</h1>
                <a class="side-link active" href="#overview">Dashboard</a>
                <a class="side-link" href="#grafica">Gráfica</a>
                <a class="side-link" href="#usuarios">Usuarios</a>
                <a class="side-link" href="#inventario">Inventario</a>
                <a class="side-link" href="#ordenes">Órdenes</a>
                <a class="side-link" href="#donaciones">Donaciones</a>
                <a class="side-link" href="#noticias">Noticias</a>
                <button class="btn full" onclick="logout()">Cerrar sesión</button>
            </aside>
            <section class="main">
                <h1>Overview</h1>
                <p>Métricas de producción, inventario, órdenes y donaciones.</p>
                <div id="kpis" class="kpis">
                </div>
                <section id="grafica" class="card">
                    <h2>Gráfica de donaciones</h2>
                    <div id="donationChart" class="chart">
                    </div>
                </section>
                <section id="usuarios" class="card">
                    <h2>Usuarios y beneficiarios</h2>
                    <div id="users">
                    </div>
                </section>
                <section id="inventario" class="card">
                    <h2>Inventario y productos</h2>
                    <form id="productForm" class="admin-form">
                        <input type="hidden" id="productId">
                        <div class="field">
                            <label>Nombre</label>
                            <input id="pName" required>
                        </div>
                        <div class="field">
                            <label>Categoría</label>
                            <input id="pCategory" placeholder="Human / Pet" required>
                        </div>
                        <div class="field">
                            <label>Tipo</label>
                            <input id="pType" required>
                        </div>
                        <div class="field">
                            <label>Material</label>
                            <input id="pMaterial" required>
                        </div>
                        <div class="field">
                            <label>% reciclado</label>
                            <input id="pRecycled" type="number" value="80">
                        </div>
                        <div class="field">
                            <label>Peso gramos</label>
                            <input id="pWeight" type="number" value="500">
                        </div>
                        <div class="field">
                            <label>Precio</label>
                            <input id="pPrice" type="number" value="50000" required>
                        </div>
                        <div class="field">
                            <label>Stock</label>
                            <input id="pStock" type="number" value="5">
                        </div>
                        <div class="field">
                            <label>Imagen</label>
                            <input id="pImage" placeholder="img/protesis-mano.jpg">
                        </div>
                        <button class="btn green">Guardar producto</button>
                    </form>
                    <div id="productMsg">
                    </div>
                    <br>
                    <div id="productsAdmin">
                    </div>
                </section>
                <section id="ordenes" class="card">
                    <h2>Órdenes de productos</h2>
                    <div id="orders">
                    </div>
                </section>
                <section id="donaciones" class="card">
                    <h2>Donaciones registradas</h2>
                    <div id="donations">
                    </div>
                </section>
                <section id="noticias" class="card">
                    <h2>Crear noticia</h2>
                    <div class="field">
                        <input id="newsTitle" placeholder="Título">
                    </div>
                    <div class="field">
                        <textarea id="newsContent" placeholder="Contenido">
                        </textarea>
                    </div>
                    <div class="field">
                        <input id="newsImage" placeholder="Imagen, ej. img/impacto.jpg">
                    </div>
                    <button class="btn green" onclick="createNews()">Publicar y notificar</button>
                    <div id="newsMsg">
                    </div>
                </section>
            </section>
        </main>
        <script src="js/api.js">
        </script>
        <script src="js/admin.js">
        </script>
    </body>
</html>
