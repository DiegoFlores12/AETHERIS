<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Login | Aetheris</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <main class="login-page">
            <section class="login-art">
                <a class="logo" href="index.html">Aetheris</a>
                <h1>
                    Restoring mobility.
                    <br>
                    Building futures.
                </h1>
                <p>Comunidad dedicada a fabricación clínica sustentable.</p>
            </section>
            <section class="login-form">
                <div class="form-box">
                    <h1>Welcome back</h1>
                    <p>Ingresa tus datos para acceder a tu cuenta.</p>
                    <div class="tabs">
                        <div id="tabLogin" class="tab active">Sign In</div>
                        <div id="tabRegister" class="tab">Create Account</div>
                    </div>
                    <form id="loginForm">
                        <div class="field">
                            <label>Email</label>
                            <input id="loginEmail" type="email" value="elena@aetheris.cl">
                        </div>
                        <div class="field">
                            <label>Password</label>
                            <input id="loginPassword" type="password" value="usuario123">
                        </div>
                        <button class="btn primary full">Sign In →</button>
                    </form>
                    <form id="registerForm" class="hidden">
                        <div class="field">
                            <label>Nombre</label>
                            <input id="regName" required>
                        </div>
                        <div class="field">
                            <label>RUT</label>
                            <input id="regRut" required>
                        </div>
                        <div class="field">
                            <label>Email</label>
                            <input id="regEmail" type="email" required>
                        </div>
                        <div class="field">
                            <label>Contraseña</label>
                            <input id="regPassword" type="password" required>
                        </div>
                        <label>
                            <input id="wantsQuestionnaire" type="checkbox" checked>
                            Quiero responder cuestionario para optar al bono
                        </label>
                        <button class="btn green full">Crear cuenta</button>
                    </form>
                    <div id="msg">
                    </div>
                </div>
            </section>
        </main>
        <script src="js/api.js">
        </script>
        <script src="js/login.js">
        </script>
    </body>
</html>
