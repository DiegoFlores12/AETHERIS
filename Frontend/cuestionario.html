<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Cuestionario | Aetheris</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <nav class="nav">
            <a class="logo" href="index.html">Aetheris</a>
            <div class="nav-links">
                <a href="catalogo.html">Catálogo</a>
                <a href="cuenta.html">Mi Cuenta</a>
            </div>
        </nav>
        <main class="container">
            <div class="card">
                <h1 class="page-title">Formulario Bono Canje Voluntario</h1>
                <p>Completa estos datos para clasificar como Usuario Voluntario.</p>
                <form id="qForm" class="grid two">
                    <div class="field">
                        <label>Integrantes familiares</label>
                        <input id="familyMembers" type="number" value="4">
                    </div>
                    <div class="field">
                        <label>Ingreso mensual aproximado</label>
                        <input id="monthlyIncome" type="number" value="450000">
                    </div>
                    <div class="field">
                        <label>Tipo de discapacidad o necesidad</label>
                        <input id="disabilityType" placeholder="Ej. movilidad reducida">
                    </div>
                    <div class="field">
                        <label>Descripción</label>
                        <textarea id="needsDescription">
                        </textarea>
                    </div>
                    <button class="btn green">Guardar cuestionario</button>
                </form>
                <div id="msg">
                </div>
            </div>
        </main>
        <script src="js/api.js">
        </script>
        <script>
            if(!getToken()) location.href='login.html';
            qForm.onsubmit=async(e)=>{e.preventDefault();try{await api('/profile/questionnaire',{method:'POST',body:JSON.stringify({familyMembers:familyMembers.value,monthlyIncome:monthlyIncome.value,disabilityType:disabilityType.value,needsDescription:needsDescription.value})});location.href='cuenta.html';}catch(err){msg.className='error';msg.textContent=err.message;}};
        </script>
    </body>
</html>
